<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">

            <h3>
                ✏ Edit Task
            </h3>

        </div>

        <div class="card-body">

            <form method="post">

                <!-- Task -->

                <div class="mb-3">

                    <label class="form-label">
                        Task Title
                    </label>

                    <input
                        type="text"
                        name="task"
                        class="form-control"
                        value="{{ task[1] }}"
                        required>

                </div>

                <!-- Priority -->

                <div class="mb-3">

                    <label class="form-label">
                        Priority
                    </label>

                    <select
                        name="priority"
                        class="form-select">

                        <option value="High"
                        {% if task[3]=='High' %}selected{% endif %}>
                            High
                        </option>

                        <option value="Medium"
                        {% if task[3]=='Medium' %}selected{% endif %}>
                            Medium
                        </option>

                        <option value="Low"
                        {% if task[3]=='Low' %}selected{% endif %}>
                            Low
                        </option>

                    </select>

                </div>

                <!-- Category -->

                <div class="mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <select
                        name="category"
                        class="form-select">

                        <option value="General"
                        {% if task[4]=='General' %}selected{% endif %}>
                            General
                        </option>

                        <option value="Docker"
                        {% if task[4]=='Docker' %}selected{% endif %}>
                            Docker
                        </option>

                        <option value="College"
                        {% if task[4]=='College' %}selected{% endif %}>
                            College
                        </option>

                        <option value="Work"
                        {% if task[4]=='Work' %}selected{% endif %}>
                            Work
                        </option>

                        <option value="Personal"
                        {% if task[4]=='Personal' %}selected{% endif %}>
                            Personal
                        </option>

                    </select>

                </div>

                <!-- Status -->

                <div class="mb-3">

                    <label class="form-label">
                        Status
                    </label>

                    <select
                        name="status"
                        class="form-select">

                        <option value="To Do"
                        {% if task[7]=='To Do' %}selected{% endif %}>
                            To Do
                        </option>

                        <option value="In Progress"
                        {% if task[7]=='In Progress' %}selected{% endif %}>
                            In Progress
                        </option>

                        <option value="Blocked"
                        {% if task[7]=='Blocked' %}selected{% endif %}>
                            Blocked
                        </option>

                        <option value="Completed"
                        {% if task[7]=='Completed' %}selected{% endif %}>
                            Completed
                        </option>

                    </select>

                </div>

                <!-- Due Date -->

                <div class="mb-3">

                    <label class="form-label">
                        Due Date
                    </label>

                    <input
                        type="date"
                        name="due_date"
                        class="form-control"
                        value="{{ task[6] if task[6] else '' }}">

                </div>

                <!-- Notes -->

                <div class="mb-3">

                    <label class="form-label">
                        Notes
                    </label>

                    <textarea
                        name="notes"
                        rows="6"
                        class="form-control">{{ task[5] if task[5] else '' }}</textarea>

                </div>

                <!-- Created Timestamp -->

                <div class="mb-4">

                    <label class="form-label">
                        Created
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ task[8] }}"
                        readonly>

                </div>

                <!-- Buttons -->

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Save Changes

                    </button>

                    <a href="/"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
