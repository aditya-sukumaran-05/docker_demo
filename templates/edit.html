<!DOCTYPE html>
<html>

<head>

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3>Edit Task</h3>
        </div>

        <div class="card-body">

            <form method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Task
                    </label>

                    <input
                        type="text"
                        name="task"
                        class="form-control"
                        value="{{ task[1] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Priority
                    </label>

                    <select
                        name="priority"
                        class="form-select">

                        <option value="High"
                        {% if task[3]=='High' %}selected{% endif %}>
                            High
                        </option>

                        <option value="Medium"
                        {% if task[3]=='Medium' %}selected{% endif %}>
                            Medium
                        </option>

                        <option value="Low"
                        {% if task[3]=='Low' %}selected{% endif %}>
                            Low
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Due Date
                    </label>

                    <input
                        type="date"
                        name="due_date"
                        class="form-control"
                        value="{{ task[4] if task[4] else '' }}">

                </div>

                <button class="btn btn-primary">
                    Save Changes
                </button>

                <a href="/" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
